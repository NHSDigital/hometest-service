---
name: "Initialize mise"
description: "Initialize mise"
runs:
  using: "composite"
  steps:
    - name: Configure git
      shell: bash
      run: |
        echo "::group::Configure git"
        git config --global --add safe.directory '*'
        echo "::endgroup::"

    - name: "Determine repo root"
      id: repo-root
      shell: bash
      run: |
        REPO_ROOT=$(git -C "$GITHUB_ACTION_PATH" rev-parse --show-toplevel)
        echo "path=${REPO_ROOT}" >> "$GITHUB_OUTPUT"

    - name: "Restore mise cache"
      uses: actions/cache/restore@v5
      with:
        path: |
          ~/.local/share/mise
          ${{ inputs.working_directory }}/.mise-cache
        key: mise-${{ runner.os }}-service-${{ hashFiles(format('{0}/mise.lock', inputs.working_directory)) }}
        restore-keys: |
          mise-${{ runner.os }}-service-
          mise-${{ runner.os }}-

    # - name: Cache mise
    #   uses: actions/cache@v5
    #   with:
    #     path: |
    #       ~/.local/share/mise
    #       ${{ inputs.working_directory }}/.mise-cache
    #     key: mise-${{ runner.os }}-service-${{ github.event_name == 'pull_request' && 'pr' || 'push' }}-${{ hashFiles(format('{0}/mise.lock', steps.repo-root.outputs.path)) }}
    #     restore-keys: |
    #       mise-${{ runner.os }}-service-${{ github.event_name == 'pull_request' && 'pr' || 'push' }}-
    #       mise-${{ runner.os }}-service-
    #       mise-${{ runner.os }}-

    - name: Install mise
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        curl https://mise.run | sh
        echo "$HOME/.local/share/mise/bin" >> $GITHUB_PATH
        echo "$HOME/.local/share/mise/shims" >> $GITHUB_PATH

    - name: Mise install
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        mise install

    - name: "Save mise cache"
      if: always()
      uses: actions/cache/save@v5
      with:
        path: |
          ~/.local/share/mise
          ${{ inputs.working_directory }}/.mise-cache
        key: mise-${{ runner.os }}-service-${{ hashFiles(format('{0}/mise.lock', inputs.working_directory)) }}
