---
name: "Initialize mise"
description: "Initialize mise"
inputs:
  github_token:
    description: "GitHub token to avoid rate limiting when mise fetches tool versions"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Configure git
      shell: bash
      run: |
        echo "::group::Configure git"
        git config --global --add safe.directory '*'
        echo "::endgroup::"

    - name: Install mise
      uses: jdx/mise-action@v4
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        MISE_VERBOSE: "1"
      with:
        cache: true
        install: true
        github_token: ${{ inputs.github_token }}

    - name: Cache node_modules
      uses: actions/cache@v5
      with:
        path: |
          node_modules
          ui/node_modules
          lambdas/node_modules
          tests/node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          node-modules-${{ runner.os }}-

    - name: Install npm dependencies
      shell: bash
      run: |
        echo "::group::Install npm dependencies"
        mise run install-npm
        echo "::endgroup::"
