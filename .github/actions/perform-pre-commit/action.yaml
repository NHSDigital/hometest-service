---
name: "Perform pre-commit checks"
description: "Perform pre-commit checks"
runs:
  using: "composite"
  steps:
    - name: Configure git
      shell: bash
      run: |
        echo "::group::Configure git"
        git config --global --add safe.directory '*'
        echo "::endgroup::"

    - name: Install mise
      uses: jdx/mise-action@v3
      with:
        cache: true
        install: true

    - name: Cache pre-commit hooks
      uses: actions/cache@v5
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
        restore-keys: |
          pre-commit-${{ runner.os }}-

    - name: Install pre-commit
      shell: bash
      run: |
        echo "::group::Install pre-commit hooks"
        mise exec -- pre-commit install --install-hooks
        echo "::endgroup::"

        echo "::group::Install npm dependencies"
        mise run install-npm
        echo "::endgroup::"

    - name: Run pre-commit
      shell: bash
      run: |
        echo "::group::Run pre-commit checks"
        mise exec -- pre-commit run --all-files --show-diff-on-failure --color=always
        echo "::endgroup::"
      env:
        PRE_COMMIT_COLOR: always
