---
name: "Test stage"

on:
  workflow_call:
    inputs:
      build_datetime:
        description: "Build datetime, set by the CI/CD pipeline workflow"
        required: true
        type: string
      build_timestamp:
        description: "Build timestamp, set by the CI/CD pipeline workflow"
        required: true
        type: string
      build_epoch:
        description: "Build epoch, set by the CI/CD pipeline workflow"
        required: true
        type: string
      nodejs_version:
        description: "Node.js version, set by the CI/CD pipeline workflow"
        required: true
        type: string
      python_version:
        description: "Python version, set by the CI/CD pipeline workflow"
        required: true
        type: string
      terraform_version:
        description: "Terraform version, set by the CI/CD pipeline workflow"
        required: true
        type: string
      version:
        description: "Version of the software, set by the CI/CD pipeline workflow"
        required: true
        type: string

jobs:
  test-unit-ui:
    name: "UI unit tests"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
      - name: Initialize mise
        uses: ./.github/actions/init-mise
      - name: "Run UI tests"
        uses: ./.github/actions/run-npm-tests
        with:
          working-directory: ui
          nodejs-version: "${{ inputs.nodejs_version }}"
          artifact-prefix: ui
          test-name: "Jest UI Tests"
          coverage-threshold: "70"
          report-title: "UI Coverage Report"

  test-unit-lambda:
    name: "Lambda unit tests"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
      - name: Initialize mise
        uses: ./.github/actions/init-mise
      - name: "Run Lambda tests"
        uses: ./.github/actions/run-npm-tests
        with:
          working-directory: lambdas
          nodejs-version: "${{ inputs.nodejs_version }}"
          artifact-prefix: lambdas
          test-name: "Jest Lambda Tests"
          report-title: "Lambdas Coverage Report"
  test-lint:
    name: "Linting"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
      - name: "Run test coverage check"
        run: |
          make test-coverage
      - name: "Save the coverage check result"
        run: |
          echo "Nothing to save"

  test-playwright:
    name: "Playwright E2E tests"
    needs: [test-unit-ui, test-unit-lambda]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
      - name: "Install mise"
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      # - name: Cache npm
      #   uses: actions/cache@v5
      #   with:
      #     path: ~/.cache/pre-commit
      #     key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
      #     restore-keys: |
      #       pre-commit-${{ runner.os }}-

      - name: "Install project dependencies"
        run: |
          npm install
      - name: "Start the application"
        run: |
          npm run start
      - name: "Install dependencies"
        working-directory: tests
        run: npm ci
      - name: "Install Playwright browsers"
        working-directory: tests
        run: npx playwright install --with-deps
      - name: "Create nhs login private key file"
        env:
          NHS_LOGIN_PRIVATE_KEY: ${{ secrets.NHS_LOGIN_PRIVATE_KEY }}
        run: |
          mkdir -p local-environment/infra/resources/secrets
          printf '%s\n' "$NHS_LOGIN_PRIVATE_KEY" > local-environment/infra/resources/secrets/nhs-login-private-key.pem
      - name: "Create credentials file"
        working-directory: tests
        run: |
          cat > credentials.ts << 'EOF'
          export const userPasswordGeneric = '${{ secrets.PLAYWRIGHT_PASSWORD }}';
          export const OTP = '${{ secrets.PLAYWRIGHT_OTP }}';
          EOF
      - name: "Run Playwright tests"
        # working-directory: tests
        run: npm run test:playwright
        env:
          CI: true
          # BASE_URL: ${{ vars.TEST_BASE_URL }}
      - name: "Upload test results"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/testResults/
          retention-days: 30

  perform-static-analysis:
    name: "Perform static analysis"
    needs: [test-unit-ui, test-unit-lambda]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 5
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history is needed to improving relevancy of reporting
      - name: "Perform static analysis"
        uses: ./.github/actions/perform-static-analysis
        with:
          sonar_organisation_key: "${{ vars.SONAR_ORGANISATION_KEY }}"
          sonar_project_key: "${{ vars.SONAR_PROJECT_KEY }}"
          sonar_token: "${{ secrets.SONAR_TOKEN }}"
