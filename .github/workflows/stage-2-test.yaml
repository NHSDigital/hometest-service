---
name: "Test stage"

on:
  workflow_call:
    inputs:
      build_datetime:
        description: "Build datetime, set by the CI/CD pipeline workflow"
        required: true
        type: string
      build_timestamp:
        description: "Build timestamp, set by the CI/CD pipeline workflow"
        required: true
        type: string
      build_epoch:
        description: "Build epoch, set by the CI/CD pipeline workflow"
        required: true
        type: string
      nodejs_version:
        description: "Node.js version, set by the CI/CD pipeline workflow"
        required: true
        type: string
      python_version:
        description: "Python version, set by the CI/CD pipeline workflow"
        required: true
        type: string
      terraform_version:
        description: "Terraform version, set by the CI/CD pipeline workflow"
        required: true
        type: string
      version:
        description: "Version of the software, set by the CI/CD pipeline workflow"
        required: true
        type: string

jobs:
  test-unit-ui:
    name: "UI unit tests"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
      - name: "Setup Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: "${{ inputs.nodejs_version }}"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: "Install UI dependencies"
        run: npm --prefix ui ci
      - name: "Run UI unit test suite"
        run: |
          npm --prefix ui run test -- --ci
      - name: "Upload test results"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: ui/test-results/
          retention-days: 30
      - name: "Upload coverage report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ui/coverage/lcov-report/
          retention-days: 30
      - name: "Test Report"
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "Jest Unit Tests"
          path: ui/test-results/junit.xml
          reporter: jest-junit
      - name: "UI Coverage Summary"
        if: always()
        run: |
          LINES=$(jq '.total.lines.pct' ui/coverage/coverage-summary.json)
          STATEMENTS=$(jq '.total.statements.pct' ui/coverage/coverage-summary.json)
          FUNCTIONS=$(jq '.total.functions.pct' ui/coverage/coverage-summary.json)
          BRANCHES=$(jq '.total.branches.pct' ui/coverage/coverage-summary.json)

          echo "### 📊 UI Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lines | ${LINES}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Statements | ${STATEMENTS}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Functions | ${FUNCTIONS}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Branches | ${BRANCHES}% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📁 Download the **coverage-report** artifact for detailed HTML report" >> $GITHUB_STEP_SUMMARY
      - name: "Check coverage threshold"
        run: |
          COVERAGE=$(jq '.total.lines.pct' ui/coverage/coverage-summary.json)
          THRESHOLD=70
          echo "Line coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
      - name: "Coverage Report Comment"
        uses: MishaKav/jest-coverage-comment@v1
        with:
          coverage-summary-path: ui/coverage/coverage-summary.json
          title: "UI Coverage Report"
          badge-title: Coverage
          hide-comment: false
  test-unit-lambda:
    name: "Lambda unit tests"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
      - name: "Setup Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: "${{ inputs.nodejs_version }}"
          cache: npm
          cache-dependency-path: lambdas/package-lock.json
      - name: "Install Lambda dependencies"
        run: npm --prefix lambdas ci
      - name: "Run Lambdas unit test suite"
        run: |
          npm --prefix lambdas run test -- --ci
      - name: "Upload Lambdas test results"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lambdas-test-results
          path: lambdas/test-results/
          retention-days: 30
      - name: "Upload Lambdas coverage report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lambdas-coverage-report
          path: lambdas/coverage/lcov-report/
          retention-days: 30
      - name: "Lambdas Test Report"
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "Jest Lambdas Tests"
          path: lambdas/test-results/junit.xml
          reporter: jest-junit
      - name: "Lambdas Coverage Summary"
        if: always()
        run: |
          LINES=$(jq '.total.lines.pct' lambdas/coverage/coverage-summary.json)
          STATEMENTS=$(jq '.total.statements.pct' lambdas/coverage/coverage-summary.json)
          FUNCTIONS=$(jq '.total.functions.pct' lambdas/coverage/coverage-summary.json)
          BRANCHES=$(jq '.total.branches.pct' lambdas/coverage/coverage-summary.json)

          echo "### 📊 Lambdas Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lines | ${LINES}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Statements | ${STATEMENTS}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Functions | ${FUNCTIONS}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Branches | ${BRANCHES}% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📁 Download the **lambdas-coverage-report** artifact for detailed HTML report" >> $GITHUB_STEP_SUMMARY
  test-lint:
    name: "Linting"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
      - name: "Run test coverage check"
        run: |
          make test-coverage
      - name: "Save the coverage check result"
        run: |
          echo "Nothing to save"
  perform-static-analysis:
    name: "Perform static analysis"
    needs: [test-unit-ui, test-unit-lambda]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 5
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history is needed to improving relevancy of reporting
      - name: "Perform static analysis"
        uses: ./.github/actions/perform-static-analysis
        with:
          sonar_organisation_key: "${{ vars.SONAR_ORGANISATION_KEY }}"
          sonar_project_key: "${{ vars.SONAR_PROJECT_KEY }}"
          sonar_token: "${{ secrets.SONAR_TOKEN }}"
