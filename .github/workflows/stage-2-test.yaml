---
name: "Test stage"

on:
  workflow_call:
    inputs:
      build_datetime:
        description: "Build datetime, set by the CI/CD pipeline workflow"
        required: true
        type: string
      build_timestamp:
        description: "Build timestamp, set by the CI/CD pipeline workflow"
        required: true
        type: string
      build_epoch:
        description: "Build epoch, set by the CI/CD pipeline workflow"
        required: true
        type: string
      nodejs_version:
        description: "Node.js version, set by the CI/CD pipeline workflow"
        required: true
        type: string
      python_version:
        description: "Python version, set by the CI/CD pipeline workflow"
        required: true
        type: string
      terraform_version:
        description: "Terraform version, set by the CI/CD pipeline workflow"
        required: true
        type: string
      version:
        description: "Version of the software, set by the CI/CD pipeline workflow"
        required: true
        type: string

jobs:
  test-unit:
    name: "Unit tests"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
      - name: "Setup Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: "${{ inputs.nodejs_version }}"
          cache: npm
      - name: "Install dependencies"
        run: |
          npm ci && npm --prefix ui ci && npm --prefix lambdas ci
      - name: "Run UI unit test suite"
        run: |
          npm --prefix ui run test
  test-lint:
    name: "Linting"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
      - name: "Run linting"
        run: |
          make test-lint
      - name: "Save the linting result"
        run: |
          echo "Nothing to save"
  test-coverage:
    name: "Test coverage"
    needs: [test-unit]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
      # - name: "Run test coverage check"
      #   run: |
      #     make test-coverage
      # - name: "Save the coverage check result"
      #   run: |
      #     echo "Nothing to save"

  test-playwright:
    name: "Playwright E2E tests"
    needs: [test-unit]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
      - name: "Install mise"
        uses: jdx/mise-action@v3
        with:
          install: true
      - name: "Install project dependencies"
        run: |
          npm install && npm --prefix ./lambdas install
      - name: "Start the application"
        run: |
          npm run start
      - name: "Install dependencies"
        working-directory: tests
        run: npm ci
      - name: "Install Playwright browsers"
        working-directory: tests
        run: npx playwright install --with-deps
      - name: "Create credentials file"
        working-directory: tests
        run: |
          cat > credentials.ts << 'EOF'
          export const userPasswordGeneric = '${{ secrets.PLAYWRIGHT_PASSWORD }}';
          export const OTP = '${{ secrets.PLAYWRIGHT_OTP }}';
          EOF
      - name: "Run Playwright tests"
        working-directory: tests
        run: npm test
        env:
          CI: true
          BASE_URL: ${{ vars.TEST_BASE_URL }}
      - name: "Upload test results"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/testResults/
          retention-days: 30


  perform-static-analysis:
    name: "Perform static analysis"
    needs: [test-unit]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 5
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history is needed to improving relevancy of reporting
      - name: "Perform static analysis"
        uses: ./.github/actions/perform-static-analysis
        with:
          sonar_organisation_key: "${{ vars.SONAR_ORGANISATION_KEY }}"
          sonar_project_key: "${{ vars.SONAR_PROJECT_KEY }}"
          sonar_token: "${{ secrets.SONAR_TOKEN }}"
