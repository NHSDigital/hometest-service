  test-playwright:
    name: "Playwright E2E tests"
    # needs: [test-unit]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
      - name: "Install mise"
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      # - name: Cache npm
      #   uses: actions/cache@v5
      #   with:
      #     path: ~/.cache/pre-commit
      #     key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
      #     restore-keys: |
      #       pre-commit-${{ runner.os }}-

      - name: "Install project dependencies"
        run: |
          npm install && npm --prefix ./lambdas install
      - name: "Start the application"
        run: |
          npm run start
      - name: "Install dependencies"
        working-directory: tests
        run: npm ci
      - name: "Install Playwright browsers"
        working-directory: tests
        run: npx playwright install --with-deps
      - name: "Create credentials file"
        working-directory: tests
        run: |
          cat > credentials.ts << 'EOF'
          export const userPasswordGeneric = '${{ secrets.PLAYWRIGHT_PASSWORD }}';
          export const OTP = '${{ secrets.PLAYWRIGHT_OTP }}';
          EOF
      - name: "Run Playwright tests"
        working-directory: tests
        run: npm test
        env:
          CI: true
          BASE_URL: ${{ vars.TEST_BASE_URL }}
      - name: "Upload test results"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/testResults/
          retention-days: 30


  perform-static-analysis:
    name: "Perform static analysis"
    needs: [test-unit-ui, test-unit-lambda]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 5
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history is needed to improving relevancy of reporting
      - name: "Perform static analysis"
        uses: ./.github/actions/perform-static-analysis
        with:
          sonar_organisation_key: "${{ vars.SONAR_ORGANISATION_KEY }}"
          sonar_project_key: "${{ vars.SONAR_PROJECT_KEY }}"
          sonar_token: "${{ secrets.SONAR_TOKEN }}"
