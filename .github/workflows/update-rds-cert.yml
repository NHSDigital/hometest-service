---
name: Update RDS Certificate

on:
  schedule:
    - cron: "0 9 1 * *" # First of every month
  workflow_dispatch:

jobs:
  update-cert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - run: npm ci
        working-directory: lambdas
      - run: npm run update-rds-cert
        working-directory: lambdas
      - uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update RDS CA certificate bundle"
          title: "[HOTE-000] chore: update RDS CA certificate bundle"
          body: |
            This PR updates the RDS CA certificate bundle to ensure continued secure connectivity to RDS instances.
            This is a routine monthly update to keep the certificate bundle current with the latest certificates provided by AWS.

            This PR was auto-generated by [create-pull-request][1]
            from the [update-rds-cert][2] workflow.

            [1]: https://github.com/peter-evans/create-pull-request
            [2]: .github/workflows/update-rds-cert.yml
          branch: chore/hote-000/update-rds-cert
