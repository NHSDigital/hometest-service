name: Run Performance Tests
run-name: 'Performance tests | env: ${{ inputs.environment}} | type: ${{ inputs.test_type}}'

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment name'
        required: true
        default: 'perf'
      test_type:
        description: 'Test type. single-user(1 user), load-test(228 users/1 hour), soak-test(1440 users/10 hours), stress-test (2280 users/1 hour)'
        required: true
        default: 'single-user'
        type: choice
        options:
          - single-user
          - load-test
          - soak-test
          - stress-test
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      test_type:
        required: true
        type: string

jobs:
  perf-tests:
    uses: ./.github/workflows/performance-tests-runner.yml
    with:
      environment: ${{ inputs.environment }}
      test_type: ${{ inputs.test_type }}
      results_artifact_name: results-${{ inputs.test_type }}-${{ github.run_id }}
    secrets: inherit

  soak-tests:
    needs: perf-tests
    if: ${{ inputs.test_type == 'soak-test' }}
    uses: ./.github/workflows/performance-tests-runner.yml
    with:
      environment: ${{ inputs.environment }}
      test_type: ${{ inputs.test_type }}
      results_artifact_name: results-soak-test-${{ github.run_id }}
    secrets: inherit

  merge-results:
    needs: soak-tests
    if: ${{ inputs.test_type == 'soak-test' }}
    runs-on: ubuntu-latest

    steps:
      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: /opt/jmeter
          key: jmeter-${{ runner.os }}-5.6.3
          restore-keys: |
            jmeter-${{ runner.os }}-

      - name: Install JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          JMETER_VERSION="5.6.3"
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-$JMETER_VERSION.tgz
          tar -xzf apache-jmeter-$JMETER_VERSION.tgz
          sudo mv apache-jmeter-$JMETER_VERSION /opt/jmeter

      - name: Add JMeter to PATH
        run: echo "/opt/jmeter/bin" >> $GITHUB_PATH

      - name: Download results artifacts
        uses: actions/download-artifact@v4
        with:
          path: perf-tests

      - name: Merge results, generate HTML report
        working-directory: perf-tests
        run: |
          ls 
          awk '(NR == 1) || (FNR > 1)' results-${{ inputs.test_type }}-${{ github.run_id }}/results-${{ inputs.test_type }}-${{ github.run_id }}.jtl results-soak-test-${{ github.run_id }}/results-soak-test-${{ github.run_id }}.jtl > results-merged.jtl jmeter -g results-merged.jtl -e -o results-merged

      - name: Export merged results
        uses: actions/upload-artifact@v4
        with:
          name: merged-results
          path: |
            perf-tests/results-merged.jtl
            perf-tests/results-merged
