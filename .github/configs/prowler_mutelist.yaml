Mutelist:
  Accounts:
    '*':
      Checks:
        ########################### START - AWS CONTROL TOWER ###########################
        ################### Add new custom rules to the bottom of the file ###################
        ### The following entries includes all resources created by AWS Control Tower when setting up a landing zone ###
        # https://docs.aws.amazon.com/controltower/latest/userguide/shared-account-resources.html #
        'cloudtrail_s3_dataevents_write_enabled':
          Regions:
            - 'us-east-1'
          Resources:
            - '*'
          Description: 'Disable as controlled externally'
        'vpc_endpoint_connections_trust_boundaries':
          Regions:
            - '*'
          Resources:
            - 'vpce-0e7acbb0178645068' # Prod
            - 'vpce-08414cf922e0ebcd3' # Test
            - 'vpce-0f97570cbd1750b39' # Int
            - 'vpce-0c8ef83202455779e' # Poc
          Description: 'Findings related to VPC Endpoint Connections Trust Boundaries muted by default for Control Tower resources'
        'awslambda_function_*':
          Regions:
            - '*'
          Resources:
            - 'aws-controltower-NotificationForwarder'
          Description: 'Checks from AWS lambda functions deployed by Control Tower muted by default'
        'cloudformation_stack*':
          Regions:
            - '*'
          Resources:
            - 'StackSet-AWSControlTowerGuardrailAWS-*'
            - 'StackSet-AWSControlTowerBP-*'
            - 'StackSet-AWSControlTowerSecurityResources-*'
            - 'StackSet-AWSControlTowerLoggingResources-*'
            - 'StackSet-AWSControlTowerExecutionRole-*'
            - 'AWSControlTowerBP-BASELINE-CLOUDTRAIL-MASTER*'
            - 'AWSControlTowerBP-BASELINE-CONFIG-MASTER*'
            - 'StackSet-AWSControlTower*'
            - 'CLOUDTRAIL-ENABLED-ON-SHARED-ACCOUNTS-*'
            - 'AFT-Backend*'
            - '*tenable*'
            - '*ResourceExplorer*'
            - '*CDKToolki*'
            - '*CSOC*'
            - '*ccoe*'
        'cloudtrail_*':
          Regions:
            - '*'
          Resources:
            - 'aws-controltower-BaselineCloudTrail'
        'cloudwatch_log_group_*':
          Regions:
            - '*'
          Resources:
            - 'aws-controltower/CloudTrailLogs'
            - '/aws/lambda/aws-controltower-NotificationForwarder'
            - 'StackSet-AWSControlTowerBP-*'
        'iam_inline_policy_no_administrative_privileges':
          Regions:
            - '*'
          Resources:
            - 'aws-controltower-ForwardSnsNotificationRole/sns'
            - 'aws-controltower-AuditAdministratorRole/AssumeRole-aws-controltower-AuditAdministratorRole'
            - 'aws-controltower-AuditReadOnlyRole/AssumeRole-aws-controltower-AuditReadOnlyRole'
        'iam.*policy_*':
          Regions:
            - '*'
          Resources:
            - 'AWSControlTowerAccountServiceRolePolicy'
            - 'AWSControlTowerServiceRolePolicy'
            - 'AWSControlTowerStackSetRolePolicy'
            - 'AWSControlTowerAdminPolicy'
            - 'AWSLoadBalancerControllerIAMPolicy'
            - 'AWSControlTowerCloudTrailRolePolicy'
        'iam_role_*':
          Regions:
            - '*'
          Resources:
            - 'aws-controltower-AdministratorExecutionRole'
            - 'aws-controltower-AuditAdministratorRole'
            - 'aws-controltower-AuditReadOnlyRole'
            - 'aws-controltower-CloudWatchLogsRole'
            - 'aws-controltower-ConfigRecorderRole'
            - 'aws-controltower-ForwardSnsNotificationRole'
            - 'aws-controltower-ReadOnlyExecutionRole'
            - 'AWSControlTower_VPCFlowLogsRole'
            - 'AWSControlTowerExecution'
            - 'AWSControlTowerCloudTrailRole'
            - 'AWSControlTowerConfigAggregatorRoleForOrganizations'
            - 'AWSControlTowerStackSetRole'
            - 'AWSControlTowerAdmin'
            - 'AWSAFTAdmin'
            - 'AWSAFTExecution'
            - 'AWSAFTService'
            - 'ResourceExplorer'
        's3_bucket_*':
          Regions:
            - '*'
          Resources:
            - 'aws-controltower-logs-*'
            - 'aws-controltower-s3-access-logs-*'
        'sns_*':
          Regions:
            - '*'
          Resources:
            - 'aws-controltower-AggregateSecurityNotifications'
            - 'aws-controltower-AllConfigNotifications'
            - 'aws-controltower-SecurityNotifications'
        'vpc_*':
          Regions:
            - '*'
          Resources:
            - '*'
          Tags:
            - 'Name=aws-controltower-VPC'
        'iam_role_administratoraccess_policy':
          Regions:
            - '*'
          Resources:
            # exact names or patterns of approved admin roles
            - 'AWSReservedSSO_AWSAdministratorAccess_*'
            - 'AWSReservedSSO_NonProd-Admins_*'
            - 'AWSReservedSSO_Prod-Admins_*'
            - 'AWSReservedSSO_Admin_*'
            - 'OrganizationAccountAccessRole'
            - 'stacksets-exec-*'
            - 'AWS-QuickSetup-StackSet-Local-ExecutionRole'
          Description: 'Org-approved admin roles controlled via SCP; mute Prowler finding'
        'iam_policy_allows_privilege_escalation':
          Regions:
            - '*'
          Resources:
            - '*-cdk-bootstrapping-cdk-exec-role-policy'
            - 'oidc-iam-role-restricted-admin-policy2'
            - 'DNHC-PlatformSupport'
          Description: 'Deployment-related OIDC and bootstrap policies require limited privilege-escalation and role-assumption permissions for cross-account automation; controlled via SCP and explicit trust policies'
        'iam_inline_policy_allows_privilege_escalation':
          Regions:
            - '*'
          Resources:
            - 'cdk-hnb659fds-deploy-role-*-us-east-1'
            - 'cdk-hnb659fds-deploy-role-*-eu-west-2'
            - 'aft-account-prep'
          Description: 'Deployment/AFT roles need inline permissions for cross-account automation; risk constrained by SCPs and explicit trust policies'
        'iam_aws_attached_policy_no_administrative_privileges':
          Regions:
            - '*'
          Resources:
            - 'AdministratorAccess'
          Description: 'Mute policy-level AdminAccess finding; role-level check remains enforced and scoped via approved admin roles'
        ########################### END - AWS CONTROL TOWER ###########################
        ################### Add new rules to the bottom of the file ###################
        's3_bucket_lifecycle_enabled':
          Regions:
            - '*'
          Resources:
            - 'cdk-*-assets-*'
          Description: 'CDK-managed buckets do not require lifecycle policies'
        's3_bucket_object_versioning':
          Regions:
            - '*'
          Resources:
            - '*-nhc-emis-request-payload-bucket'
            - '*-s3-access-bucket-logs'
            - 'nhs-dhc-tfstate-*'
            - '*-destination-access-bucket-logs'
            - '*-macie-exports'
            - '*-nhc-reporting-data'
            - '*-email-verification'
            - '*-nhc-evaluator-data-export'
            - '*-firehose-splunk'
            - '*-nhc-db-data-load-bucket'
            - '*-nhc-auto-db-data-load-bucket'
            - 'cdk-*-assets-*'
            - '*-nhc-selected-cohort'
            - '*-backup-reports'
            - '*-nhc-ui-bucket'
            - '*-nhc-athena-output-data'
          Exceptions:
            Accounts:
              - '992382726377' # prod account
              - '637423296417' # test account
          Description: 'Versioning not required for these buckets in nonprod environments'
        's3_bucket_kms_encryption':
          Regions:
            - '*'
          Resources:
            - 'cdk-*-assets-*'
            - '*-nhc-ui-bucket'
            - '*-truststore-bucket'
          Exceptions:
            Resources:
            - '*prod-truststore-bucket'
          Description: 'No sensitive data stored, access is already logged, and other compensating controls in place'
        's3_bucket_kms_encrypt*':
          Regions:
            - '*'
          Resources:
            - '*-truststore-bucket'
          Exceptions:
            Accounts:
              - '992382726377' # prod account
              - '637423296417' # test account
              - '899411341184' # int account
          Description: 'Truststore bucket uses SSE-S3 encryption in POC environments; KMS encryption required everywhere else'
        's3_bucket_object_lock':
          Regions:
            - '*'
          Resources:
            - '*-nhc-emis-request-payload-bucket'
            - '*-s3-access-bucket-logs'
            - '*-truststore-bucket'
            - 'nhs-dhc-tfstate-*'
            - '*-destination-access-bucket-logs'
            - '*-macie-exports'
            - '*-nhc-reporting-data'
            - '*-email-verification'
            - '*-nhc-evaluator-data-export'
            - '*-firehose-splunk'
            - '*-nhc-db-data-load-bucket'
            - '*-nhc-auto-db-data-load-bucket'
            - 'cdk-*-assets-*'
            - '*-nhc-selected-cohort'
            - '*-backup-reports'
            - '*-nhc-ui-bucket'
            - '*-nhc-athena-output-data'
          Description: 'No use case for object lock on these buckets. Also will conflict with lifecycle policies.'
        's3_bucket_event_notifications_enabled':
          Regions:
            - '*'
          Resources:
            - '*-nhc-emis-request-payload-bucket'
            - '*-s3-access-bucket-logs'
            - '*-truststore-bucket'
            - 'nhs-dhc-tfstate-*'
            - '*-destination-access-bucket-logs'
            - '*-macie-exports'
            - '*-nhc-reporting-data'
            - '*-email-verification'
            - '*-nhc-evaluator-data-export'
            - '*-firehose-splunk'
            - '*-nhc-db-data-load-bucket'
            - 'cdk-*-assets-*'
            - '*-nhc-selected-cohort'
            - '*-backup-reports'
            - '*-nhc-ui-bucket'
            - '*-nhc-athena-output-data'
          Description: 'Ignore findings where event notifications not required'
        's3_bucket_no_mfa_delete':
          Regions:
            - '*'
          Resources:
            - '*-nhc-emis-request-payload-bucket'
            - '*-s3-access-bucket-logs'
            - '*-truststore-bucket'
            - 'nhs-dhc-tfstate-*'
            - '*-destination-access-bucket-logs'
            - '*-macie-exports'
            - '*-nhc-reporting-data'
            - '*-email-verification'
            - '*-nhc-evaluator-data-export'
            - '*-firehose-splunk'
            - '*-nhc-db-data-load-bucket'
            - '*-nhc-auto-db-data-load-bucket'
            - 'cdk-*-assets-*'
            - '*-nhc-selected-cohort'
            - '*-backup-reports'
            - '*-nhc-ui-bucket'
            - '*-nhc-athena-output-data'
          Description: 'MFA Delete is not supported by lifecycle actions, and is not required due to other controls in place'
        'apigateway_restapi_public':
          Regions:
            - '*'
          Resources:
            - '*-health-check-api'
            - '*-health-check-results-mtls-api'
            - '*-health-check-results-api'
