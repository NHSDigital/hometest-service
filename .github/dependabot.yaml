---
version: 2

updates:
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/.github/actions/*"
    schedule:
      interval: "daily"

  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/ui"
      - "/lambdas"
      - "/tests"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    groups:
      aws-dependencies:
        patterns:
          - "@aws-sdk/*"
          - "aws-sdk"
          - "@aws-lambda-powertools/*"
          - "aws-lambda"
          - "@types/aws-lambda"
          - "@middy/*"

      react-dependencies:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
          - "@types/react"
          - "@types/react-dom"
          - "next"
          - "eslint-config-next"

      testing-dependencies:
        patterns:
          - "jest"
          - "jest-*"
          - "@jest/*"
          - "ts-jest"
          - "@testing-library/*"
          - "@testcontainers/*"
          - "@playwright/test"
          - "@axe-core/playwright"
          - "axe-html-reporter"
          - "@types/jest"

      typescript-eslint-dependencies:
        patterns:
          - "typescript"
          - "typescript-eslint"
          - "@typescript-eslint/*"
          - "eslint"
          - "@eslint/*"
          - "globals"
          - "prettier"
          - "@trivago/prettier-plugin-sort-imports"

      nhs-dependencies:
        patterns:
          - "nhsuk-frontend"
          - "nhsuk-react-components"
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "gomod"
    directory: "/lambdas/goose-migrator-lambda/src"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    groups:
      go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "daily"
