description: Request to post test results
type: object
required:
  - orderId
  - orderExternalReference
  - pendingReorder
  - resultData
  - resultDate
properties:
  orderId:
    type: string
    description: The order identifier generated by the supplier.
    maxLength: 128
  orderExternalReference:
    type: string
    description: The order identifier in NHS Digital Health Checks.
    maxLength: 128
  pendingReorder:
    type: boolean
  resultData:
    type: array
    description: The outcome of the Sample that was tested
    items:
      type: object
      required:
        - biomarkerCode
        - successful
      properties:
        biomarkerCode:
          type: string
        units:
          type: string
        value:
          type: number
        successful:
          type: boolean
        failureReasonCode:
          type: string
        failureReasonDescription:
          type: string
  resultDate:
    type: string
    format: date-time
    description: Date-time (ISO 8601 format) of result creation
