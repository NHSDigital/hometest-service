---
source:
  # set the name of the target being analysed
  name: "hometest-service"

# only catalog npm/javascript packages — this repo is TypeScript only
# go-module-binary-cataloger and others are intentionally excluded to avoid
# false positives from local Terraform provider binaries and Docker build artifacts
select-catalogers:
  - "javascript"
  - "github-actions"

# exclude local-only directories that are not part of the application source
exclude:
  - ./.git/**
  - ./**/node_modules/**
  - ./**/.terraform/**

# number of cataloger workers to run in parallel
parallelism: 4

package:
  search-indexed-archives: true
  search-unindexed-archives: false

javascript:
  # include development dependencies — relevant for identifying vulnerabilities in test tooling
  include-dev-dependencies: true

log:
  level: "warn"
