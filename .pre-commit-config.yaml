---
repos:
  # https://github.com/pre-commit/pre-commit-hooks/releases
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master, --branch, develop]

  - repo: local
    hooks:
      - id: grype
        name: Grype filesystem vulnerability scan
        entry: grype
        args:
          - dir:.
          - --quiet
          - -o
          - template
          - -t
          - scripts/config/grype-table.tmpl
          - --name
          - hometest-service
          - -c
          - scripts/config/grype.yaml
        language: system
        pass_filenames: false

      - id: gitleaks
        name: gitleaks
        entry: gitleaks detect --no-git --redact --verbose --config=scripts/config/gitleaks.toml
        language: system
        pass_filenames: false

      - id: prettier-formatting
        name: prettier-formatting
        entry: npm run format:pre-commit --
        language: system

      - id: eslint-ui
        name: ESLint (UI)
        entry: npm --prefix ui run lint -- --fix
        language: system
        files: ^ui/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

      - id: eslint-lambdas
        name: ESLint (Lambdas)
        entry: npm --prefix lambdas run lint -- --fix
        language: system
        files: ^lambdas/.*\.(ts|js)$
        pass_filenames: false

      - id: eslint-tests
        name: ESLint (Tests)
        entry: npm --prefix tests run lint -- --fix
        language: system
        files: ^tests/.*\.(ts|js)$
        pass_filenames: false

      - id: check-typescript-ui
        name: TypeScript (UI)
        entry: npm --prefix ui run check-typescript
        language: system
        files: ^ui/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

      - id: check-typescript-lambdas
        name: TypeScript (Lambdas)
        entry: npm --prefix lambdas run check-typescript
        language: system
        files: ^lambdas/.*\.(ts|js)$
        pass_filenames: false

      - id: check-typescript-tests
        name: TypeScript (Tests)
        entry: npm --prefix tests run check-typescript
        language: system
        files: ^tests/.*\.(ts|js)$
        pass_filenames: false

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        name: yamllint
        description: This hook runs yamllint.
        entry: yamllint
        language: python
        types: [file, yaml]

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        # exclude: ^infrastructure/src
        args: [--fix]

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
        files: ^local-environment/infra
        args:
          - --args=-recursive

  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 4.1.0 # pin to a specific version
    hooks:
      - id: sqlfluff-lint
        args: ["--config", ".sqlfluff"] # optional, if you keep config elsewhere
      - id: sqlfluff-fix
        args: ["--config", ".sqlfluff"] # auto-fix style issues
