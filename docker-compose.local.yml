version: '3.8'

# Local development environment for NHS Home Testing Service
# Usage: docker-compose -f docker-compose.local.yml up -d

services:
  # DynamoDB Local - replaces AWS DynamoDB for local development
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: nht-dynamodb
    ports:
      - "8000:8000"
    # command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /data"
    # volumes:
    #   - dynamodb-data:/data
    # Use in-memory mode to avoid SQLite file permission issues
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # DynamoDB Admin UI - visual interface for DynamoDB Local
  dynamodb-admin:
    image: aaronshaf/dynamodb-admin
    container_name: nht-dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      DYNAMO_ENDPOINT: http://dynamodb-local:8000
      AWS_REGION: eu-west-2
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    depends_on:
      dynamodb-local:
        condition: service_healthy

