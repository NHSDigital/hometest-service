[tools]
# Custom registries are not included in mise-versions
# https://mise-versions.jdx.dev/

# mise registry | grep -i aws
# mise plugins ls-remote | grep aws
# mise ls-remote aws-cli

## Infrastructure tools

# https://github.com/hashicorp/terraform/releases
terraform = "1.14.4"

# https://github.com/gruntwork-io/terragrunt/releases
terragrunt = "0.99.1"

# https://github.com/terraform-linters/tflint/releases
tflint = "latest"

# https://github.com/terraform-docs/terraform-docs/releases
terraform-docs = "latest"

# https://github.com/aws/aws-cli/tags
awscli = "2.33.13"

## Security scanning

# https://github.com/aquasecurity/trivy/releases
trivy = "latest"

# https://github.com/bridgecrewio/checkov/releases
# checkov = "latest"

# https://github.com/gitleaks/gitleaks/releases
gitleaks = "8.18.4"

## Pre-commit and linting

# https://github.com/pre-commit/pre-commit/releases
pre-commit = "latest"

# https://github.com/errata-ai/vale/releases
vale = "latest"

# https://github.com/igorshubovych/markdownlint-cli/releases
# markdownlint-cli = "latest"

## Application dependencies

# https://nodejs.org/en/download/releases
node = "24"

# https://www.python.org/downloads/
python = "3.12"

[tasks.setup]
description = "Setup local development environment"
run = """
  echo "Installing pre-commit hooks with local config..."
  if [ -f .pre-commit-config-local.yaml ]; then
    pre-commit install --config .pre-commit-config-local.yaml
  else
    pre-commit install
  fi
  echo "Setup complete!"
"""

[tasks.pre-commit]
description = "Run pre-commit checks on all files"
run = """
  if [ -f .pre-commit-config-local.yaml ]; then
    echo "Using local pre-commit config..."
    pre-commit run --config .pre-commit-config-local.yaml --all-files --show-diff-on-failure --color=always
  else
    pre-commit run --all-files --show-diff-on-failure --color=always
  fi
"""

[tasks.install-npm]
description = "Install npm dependencies"
run = "npm install"
