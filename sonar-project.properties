sonar.projectKey=NHSDigital_hometest-service
sonar.organisation=nhsdigital

sonar.sourceEncoding=UTF-8

sonar.sources=lambdas/src,ui/src
sonar.tests=lambdas/src,ui/src

sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/*.test.js,**/*.spec.js

sonar.exclusions=**/node_modules/**,**/coverage/**,**/dist/**,**/.next/**,**/build/**

# Exclude test files from duplication detection
sonar.cpd.exclusions=**/*.test.ts,**/*.spec.ts,**/*.test.js,**/*.spec.js

# Exclude common security rules from test files (hardcoded credentials, crypto, etc.)
# Other code quality rules (bugs, code smells) will still apply
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8
# Hard-coded credentials (S2068)
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.test.*
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S2068
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.test.*
# Pseudorandom number generators (S2245)
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S2245
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.test.*
sonar.issue.ignore.multicriteria.e4.ruleKey=javascript:S2245
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*.test.*
# Cryptography rules (S4787, S5542, S5547)
sonar.issue.ignore.multicriteria.e5.ruleKey=typescript:S4787
sonar.issue.ignore.multicriteria.e5.resourceKey=**/*.test.*
sonar.issue.ignore.multicriteria.e6.ruleKey=typescript:S5542
sonar.issue.ignore.multicriteria.e6.resourceKey=**/*.test.*
sonar.issue.ignore.multicriteria.e7.ruleKey=typescript:S5547
sonar.issue.ignore.multicriteria.e7.resourceKey=**/*.test.*
# Use of weak SSL/TLS protocols (S4423)
sonar.issue.ignore.multicriteria.e8.ruleKey=typescript:S4423
sonar.issue.ignore.multicriteria.e8.resourceKey=**/*.test.*

sonar.typescript.tsconfigPaths=lambdas/tsconfig.json,ui/tsconfig.json

sonar.javascript.environments=node,browser
