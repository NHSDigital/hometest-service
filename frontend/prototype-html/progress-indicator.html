

{% extends 'layout-app.html' %}

{% block content %}

    <div id="spinner" class="loading-spinner-background" tabindex="-1" focusable="false">
        <div class="loading-spinner" tabindex="-1" focusable="false">
            <span class="nhsuk-u-visually-hidden" aria-live="polite">Submitting your order</span>
        </div>
        <h2 class="nhsuk-heading-m">Submitting your order</h2>
    </div>

    <style lang="scss">
        .loading-spinner-background {
                position: fixed;
                z-index: 10;
                top: 0;
                right: 0;
                left: 0;
                bottom: 0;
                background-color: transparent;

                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;

                row-gap: 15px;
        }

        .loading-spinner {
            margin: 0;
            border-top: 0.3em solid rgba(0, 94, 184, 1);
            border-right: 0.3em solid rgba(0, 94, 184, 1);
            border-bottom: 0.3em solid rgba(0, 94, 184, 1);
            border-left: 0.3em solid rgba(0, 94, 184, 0);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            animation: spinner-animation 1.5s linear forwards;
            animation-iteration-count: 5;
        }

        @keyframes spinner-animation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

    </style>

{% endblock %}
